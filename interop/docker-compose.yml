# Mixed-network interop testing: rxrpl + rippled validators
#
# Spins up a 5-node private network:
#   - 3 rippled validators
#   - 2 rxrpl validators
#
# With 5 trusted validators, rippled's 80% quorum is 4, so the network
# keeps advancing when any single validator is lost. That fault tolerance
# is required by the chaos tests (crash/recover, crash/rejoin), which a
# 3-node UNL (quorum 3, zero tolerance) cannot satisfy. The rxrpl-as-voter
# path stays observable via validation_count in the rxrpl logs.
#
# All nodes share a common UNL and genesis ledger.
# Usage:
#   docker compose -f interop/docker-compose.yml up --build --abort-on-container-exit
#
# The test-runner container executes the interop test suite and exits 0/1.

services:
  # --- rippled validators ---
  rippled-0:
    image: ${RIPPLED_IMAGE:-rippleci/rippled:2.3.0}
    container_name: interop-rippled-0
    volumes:
      - ./configs/rippled-0.cfg:/etc/opt/ripple/rippled.cfg:ro
      - ./configs/validators.txt:/etc/opt/ripple/validators.txt:ro
    ports:
      - "15005:5005"
    networks:
      xrpl-net:
        ipv4_address: 172.30.0.10

  rippled-1:
    image: ${RIPPLED_IMAGE:-rippleci/rippled:2.3.0}
    container_name: interop-rippled-1
    volumes:
      - ./configs/rippled-1.cfg:/etc/opt/ripple/rippled.cfg:ro
      - ./configs/validators.txt:/etc/opt/ripple/validators.txt:ro
    networks:
      xrpl-net:
        ipv4_address: 172.30.0.11

  rippled-2:
    image: ${RIPPLED_IMAGE:-rippleci/rippled:2.3.0}
    container_name: interop-rippled-2
    volumes:
      - ./configs/rippled-2.cfg:/etc/opt/ripple/rippled.cfg:ro
      - ./configs/validators.txt:/etc/opt/ripple/validators.txt:ro
    networks:
      xrpl-net:
        ipv4_address: 172.30.0.12

  # --- rxrpl validators ---
  rxrpl-0:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: interop-rxrpl-0
    command: ["run", "--config", "/etc/rxrpl/config.toml", "--mode", "network"]
    volumes:
      - ./configs/rxrpl-0.toml:/etc/rxrpl/config.toml:ro
    ports:
      - "25005:5005"
    networks:
      xrpl-net:
        ipv4_address: 172.30.0.20

  rxrpl-1:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: interop-rxrpl-1
    command: ["run", "--config", "/etc/rxrpl/config.toml", "--mode", "network"]
    volumes:
      - ./configs/rxrpl-1.toml:/etc/rxrpl/config.toml:ro
    networks:
      xrpl-net:
        ipv4_address: 172.30.0.21

  # --- test runner ---
  test-runner:
    build:
      context: .
      dockerfile: Dockerfile.test
    depends_on:
      - rippled-0
      - rippled-1
      - rippled-2
      - rxrpl-0
      - rxrpl-1
    environment:
      RIPPLED_URLS: "http://172.30.0.10:5005,http://172.30.0.11:5005,http://172.30.0.12:5005"
      RXRPL_URLS: "http://172.30.0.20:5005,http://172.30.0.21:5005"
      # Used by B3 log-scrape and B4/B5 chaos tests. Names match the
      # `container_name` fields above and are independent of the compose
      # project name.
      RIPPLED_CONTAINERS: "interop-rippled-0,interop-rippled-1,interop-rippled-2"
      RXRPL_CONTAINERS: "interop-rxrpl-0,interop-rxrpl-1"
    volumes:
      # Required by B3 log-scrape and B4/B5 chaos tests so the runner can
      # invoke `docker logs`, `docker stop`, `docker start` against sibling
      # containers via the host docker socket.
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      xrpl-net:
        ipv4_address: 172.30.0.100

networks:
  xrpl-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/24
