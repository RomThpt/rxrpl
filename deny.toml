[advisories]
# Vulnerabilities and unsound advisories are always denied by modern cargo-deny;
# list specific advisory IDs to ignore here (with justification) if ever needed.
yanked = "deny"
# Transitive, non-vulnerability advisories accepted for now (reviewed):
# - RUSTSEC-2025-0052: async-std discontinued (unmaintained).
# - RUSTSEC-2026-0002: IterMut Stacked-Borrows unsoundness in a transitive dep.
# Real vulnerabilities (RUSTSEC vulnerability class) remain a hard deny.
ignore = ["RUSTSEC-2025-0052", "RUSTSEC-2026-0002"]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "CC0-1.0",
    "OpenSSL",
    "BSL-1.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
