[package]
name = "rxrpl-cli"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true

[lib]
name = "rxrpl_cli"
path = "src/lib.rs"

[[bin]]
name = "rxrpl"
path = "src/main.rs"

[features]
default = ["rocksdb"]
rocksdb = ["rxrpl-node/rocksdb"]

[dependencies]
rxrpl = { workspace = true, features = ["full", "autofill"] }
rxrpl-node = { workspace = true }
rxrpl-config = { workspace = true }
clap = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true, features = ["env-filter"] }
serde_json = { workspace = true }
hex = { workspace = true }
toml = "0.8"
reqwest = { workspace = true }
