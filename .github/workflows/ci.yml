name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Nightly fuzz + docker (heavy jobs kept off the PR critical path).
    - cron: "0 3 * * *"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: workspace
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: workspace
      - run: cargo test --workspace

  build:
    name: Build Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release
      - run: cargo build --release

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    # Heavy: full in-container release build. Skip on PRs; run on main pushes,
    # the nightly schedule, and manual dispatch.
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: rxrpl:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - run: docker run --rm rxrpl:ci --version

  fuzz:
    name: Fuzz
    runs-on: ubuntu-latest
    # Sanitizer-instrumented nightly builds are slow; run nightly / on demand
    # rather than on every PR.
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: fuzz
          workspaces: ". -> target\nfuzz -> fuzz/target"
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-fuzz
      - run: cargo +nightly fuzz run binary_parser -- -max_total_time=30
      - run: cargo +nightly fuzz run binary_roundtrip -- -max_total_time=30
      - run: cargo +nightly fuzz run rpc_dispatch -- -max_total_time=30
      - run: cargo +nightly fuzz run p2p_codec -- -max_total_time=30
      - run: cargo +nightly fuzz run transaction_deser -- -max_total_time=30
      - run: cargo +nightly fuzz run shamap_ops -- -max_total_time=30
