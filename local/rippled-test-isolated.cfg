# Isolated rippled for P2P handshake testing
# No outbound connections, accepts inbound on 51235

[server]
port_rpc_admin_local
port_peer

[port_peer]
port = 51235
ip = 0.0.0.0
protocol = peer

[port_rpc_admin_local]
port = 5005
ip = 127.0.0.1
admin = 127.0.0.1
protocol = http

[node_size]
small

[node_db]
type=NuDB
path=/Users/romt/Developer/rippled/local/db-test/nudb
online_delete=256
advisory_delete=0

[database_path]
/Users/romt/Developer/rippled/local/db-test

[debug_logfile]
/Users/romt/Developer/rippled/local/debug-test.log

[network_id]
21465

# Prevent outbound peer connections
[peer_private]
1

# No seeds -- fully isolated
[ips_fixed]

[sntp_servers]

[ssl_verify]
0

[rpc_startup]
{ "command": "log_level", "severity": "debug" }
