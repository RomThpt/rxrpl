# Mixed-network interop testing: rxrpl + rippled validators
#
# Spins up a 3-node private network:
#   - 2 rippled validators
#   - 1 rxrpl validator
#
# Quorum 2-of-3 keeps consensus rounds short and exposes the rxrpl-as-voter
# path: any quorum without the rxrpl validation must come from 2 rippled,
# making missing rxrpl signatures observable in the validation_count.
#
# All nodes share a common UNL and genesis ledger.
# Usage:
#   docker compose -f interop/docker-compose.yml up --build --abort-on-container-exit
#
# The test-runner container executes the interop test suite and exits 0/1.

services:
  # --- rippled validators ---
  rippled-0:
    image: ${RIPPLED_IMAGE:-rippleci/rippled:2.3.0}
    volumes:
      - ./configs/rippled-0.cfg:/etc/opt/ripple/rippled.cfg:ro
      - ./configs/validators.txt:/etc/opt/ripple/validators.txt:ro
    ports:
      - "15005:5005"
    networks:
      xrpl-net:
        ipv4_address: 172.30.0.10

  rippled-1:
    image: ${RIPPLED_IMAGE:-rippleci/rippled:2.3.0}
    volumes:
      - ./configs/rippled-1.cfg:/etc/opt/ripple/rippled.cfg:ro
      - ./configs/validators.txt:/etc/opt/ripple/validators.txt:ro
    networks:
      xrpl-net:
        ipv4_address: 172.30.0.11

  # --- rxrpl validators ---
  rxrpl-0:
    build:
      context: ..
      dockerfile: Dockerfile
    command: ["run", "--config", "/etc/rxrpl/config.toml"]
    volumes:
      - ./configs/rxrpl-0.toml:/etc/rxrpl/config.toml:ro
    ports:
      - "25005:5005"
    networks:
      xrpl-net:
        ipv4_address: 172.30.0.20

  # --- test runner ---
  test-runner:
    build:
      context: .
      dockerfile: Dockerfile.test
    depends_on:
      - rippled-0
      - rippled-1
      - rxrpl-0
    environment:
      RIPPLED_URLS: "http://172.30.0.10:5005,http://172.30.0.11:5005"
      RXRPL_URLS: "http://172.30.0.20:5005"
    networks:
      xrpl-net:
        ipv4_address: 172.30.0.100

networks:
  xrpl-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/24
